<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow" />
    <meta name="referrer" content="no-referrer" />
    <title>MoviesParty - Room</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --red: #E8192C;
            --red-dim: rgba(232, 25, 44, 0.15);
            --red-glow: rgba(232, 25, 44, 0.35);
            --bg: #060608;
            --surface: #0e0e12;
            --surface2: #16161c;
            --border: rgba(255, 255, 255, 0.07);
            --border-hover: rgba(232, 25, 44, 0.45);
            --text: #f0f0f0;
            --muted: #5a5a6e;
            --muted2: #3a3a4a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 80%, rgba(232, 25, 44, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 20%, rgba(232, 25, 44, 0.04) 0%, transparent 60%);
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 480px;
            max-width: 94vw;
            animation: pageIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes pageIn {
            from {
                opacity: 0;
                transform: translateY(28px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-mark {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: var(--red);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 24px var(--red-glow);
        }

        .logo-icon svg {
            width: 22px;
            height: 22px;
        }

        .logo-text {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text);
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.1;
            margin-bottom: 10px;
            background: linear-gradient(160deg, #fff 0%, rgba(255, 255, 255, 0.55) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 14px;
            color: var(--muted);
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.03), 0 40px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .section-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 14px;
        }

        .avatars {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin-bottom: 28px;
        }

        .avatar {
            aspect-ratio: 1;
            border-radius: 14px;
            background: var(--surface2);
            border: 2px solid var(--border);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            transition: transform 0.3s ease;
        }

        .avatar:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }

        .avatar:hover img {
            transform: scale(1.05);
        }

        .avatar.selected {
            border-color: var(--red);
            background: var(--red-dim);
            box-shadow: 0 0 0 3px var(--red-dim), 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .avatar.selected::after {
            content: '';
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 8px;
            height: 8px;
            background: var(--red);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--red);
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px 14px 48px;
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            transition: all 0.25s;
            letter-spacing: 0.2px;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--red);
            background: var(--bg);
            box-shadow: 0 0 0 3px var(--red-dim);
        }

        .input-group input::placeholder {
            color: var(--muted2);
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
        }

        .btn {
            width: 100%;
            padding: 15px 24px;
            background: var(--red);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Syne', sans-serif;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px var(--red-glow);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .btn:hover {
            background: #ff1f33;
            transform: translateY(-1px);
            box-shadow: 0 8px 28px var(--red-glow);
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--muted);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(6px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease-out;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px 32px;
            max-width: 360px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            background: rgba(232, 25, 44, 0.12);
            border: 1px solid rgba(232, 25, 44, 0.25);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal h2 {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .modal p {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .modal-btn {
            width: 100%;
            padding: 13px;
            background: var(--red);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Syne', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-btn:hover {
            background: #ff1f33;
        }

        .loading-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .loading-screen.show {
            display: flex;
        }

        .loading-screen-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 60%, rgba(232, 25, 44, 0.08) 0%, transparent 70%);
        }

        .loading-logo-wrap {
            position: relative;
            width: 90px;
            height: 90px;
            margin-bottom: 32px;
            z-index: 1;
        }

        .logo-ring {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 1.5px solid rgba(232, 25, 44, 0.2);
            animation: ringPulse 2s ease-in-out infinite;
        }

        .logo-ring2 {
            position: absolute;
            inset: -20px;
            border-radius: 50%;
            border: 1px solid rgba(232, 25, 44, 0.1);
            animation: ringPulse 2s ease-in-out 0.4s infinite;
        }

        .loading-icon-box {
            width: 90px;
            height: 90px;
            background: var(--red);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px var(--red-glow);
            animation: iconFloat 3s ease-in-out infinite;
        }

        .loading-icon-box svg {
            width: 46px;
            height: 46px;
        }

        .loading-label {
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            z-index: 1;
        }

        .loading-sub {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 40px;
            z-index: 1;
        }

        .progress-track {
            width: 180px;
            height: 2px;
            background: var(--surface2);
            border-radius: 2px;
            overflow: hidden;
            z-index: 1;
        }

        .progress-fill {
            height: 100%;
            background: var(--red);
            width: 0%;
            animation: progressGo 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            box-shadow: 0 0 8px var(--red);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(24px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes ringPulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.5;
            }

            50% {
                transform: scale(1.08);
                opacity: 1;
            }
        }

        @keyframes iconFloat {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        @keyframes progressGo {
            0% {
                width: 0%;
            }

            60% {
                width: 75%;
            }

            100% {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo-mark">
                <div class="logo-icon">
                    <svg viewBox="0 0 22 22" fill="none">
                        <path d="M8 5.5L16 11L8 16.5V5.5Z" fill="white" />
                    </svg>
                </div>
                <span class="logo-text">MoviesParty</span>
            </div>
            <h1 data-i18n="whos_watching">Who's watching?</h1>
            <p class="subtitle" data-i18n="entry_subtitle">Pick an avatar and set your name to join the party.</p>
        </div>

        <div class="card">
            <div class="section-label" data-i18n="choose_avatar">Choose Avatar</div>
            <div class="avatars">
                <div class="avatar selected" data-avatar="Felix">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Felix">
                </div>
                <div class="avatar" data-avatar="Aneka">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka" alt="Aneka">
                </div>
                <div class="avatar" data-avatar="Luna">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Luna" alt="Luna">
                </div>
                <div class="avatar" data-avatar="Max">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Max" alt="Max">
                </div>
                <div class="avatar" data-avatar="Sophie">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Sophie" alt="Sophie">
                </div>
                <div class="avatar" data-avatar="Oliver">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Oliver" alt="Oliver">
                </div>
            </div>

            <div class="divider"></div>

            <div class="section-label" data-i18n="display_name">Display Name</div>
            <div class="input-group">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                <input type="text" id="displayName" data-i18n-placeholder="enter_name_placeholder"
                    placeholder="Enter your name…" autocomplete="off" />
            </div>

            <button class="btn" onclick="enterRoom()">
                <span class="btn-inner">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                        <polyline points="10 17 15 12 10 7" />
                        <line x1="15" y1="12" x2="3" y2="12" />
                    </svg>
                    <span data-i18n="enter_room">Enter Room</span>
                </span>
            </button>
        </div>

        <p class="footer-note" data-i18n="session_local">Your session stays local — no account needed.</p>
    </div>

    <div id="errorModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#E8192C" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                </svg>
            </div>
            <h2 data-i18n="name_required">Name required</h2>
            <p data-i18n="name_required_desc">Please enter a display name so others know who you are.</p>
            <button class="modal-btn" onclick="closeModal()" data-i18n="got_it">Got it</button>
        </div>
    </div>

    <div id="loadingScreen" class="loading-screen">
        <div class="loading-screen-bg"></div>
        <div class="loading-logo-wrap">
            <div class="logo-ring"></div>
            <div class="logo-ring2"></div>
            <div class="loading-icon-box">
                <svg viewBox="0 0 22 22" fill="none">
                    <path d="M8 5.5L16 11L8 16.5V5.5Z" fill="white" />
                </svg>
            </div>
        </div>
        <div class="loading-label" data-i18n="entering_room">Entering Room…</div>
        <div class="loading-sub" id="loadingSubtext"></div>
        <div class="progress-track">
            <div class="progress-fill"></div>
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="room.js"></script>
</body>

</html>
