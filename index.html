    (function () {

      function optimizeImages() {
        const images = document.querySelectorAll('img:not([data-optimized])');
        images.forEach(img => {
          img.setAttribute('data-optimized', 'true');
          if (!img.hasAttribute('loading')) img.setAttribute('loading', 'lazy');
          if (!img.hasAttribute('decoding')) img.setAttribute('decoding', 'async');
          if (!img.complete) {
            img.style.opacity = '0';
            img.style.transition = 'opacity 0.3s ease-in';
            img.addEventListener('load', function () { img.style.opacity = '1'; }, { once: true });
          }
        });
      }

      optimizeImages();
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', optimizeImages);
      window.addEventListener('load', optimizeImages);

      const observer = new MutationObserver(optimizeImages);
      if (document.body) {
        observer.observe(document.body, { childList: true, subtree: true });
      } else {
        document.addEventListener('DOMContentLoaded', function () {
          observer.observe(document.body, { childList: true, subtree: true });
        });
      }
    })();

  <script>
    (function () {
      'use strict';

      function easeOutExpo(t) {
        return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
      }

      function animateCountUp(el, target, suffix, duration) {
        var start = null;
        var startVal = 0;

        function step(timestamp) {
          if (!start) start = timestamp;
          var elapsed = timestamp - start;
          var progress = Math.min(elapsed / duration, 1);
          var eased = easeOutExpo(progress);
          var current = Math.round(startVal + (target - startVal) * eased);

          var formatted = current >= 1000
            ? current.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',')
            : current.toString();

          el.textContent = formatted + suffix;

          if (progress < 1) {
            requestAnimationFrame(step);
          } else {
            el.textContent = formatted + suffix;
          }
        }

        requestAnimationFrame(step);
      }

      // "4K" stepped animation: 1K → 2K → 3K → 4K with scale pop
      function animate4K(el) {
        var steps = ['1K', '2K', '3K', '4K'];
        var delay = 340;
        steps.forEach(function (val, i) {
          setTimeout(function () {
            el.textContent = val;
            el.style.transition = 'transform 0.18s cubic-bezier(0.34,1.56,0.64,1), color 0.18s ease';
            el.style.transform = 'scale(1.22)';
            el.style.color = i === steps.length - 1 ? '' : '#ff4d5e';
            setTimeout(function () {
              el.style.transform = 'scale(1)';
            }, 180);
          }, i * delay);
        });
      }

      function initStatItem(el) {
        if (el.dataset.counted) return;
        el.dataset.counted = 'true';

        var numberDiv = el.querySelector('.stat-number');
        if (!numberDiv) return;

        var raw = numberDiv.textContent.trim();

        // "4K" — stepped K animation
        if (raw === '4K') {
          numberDiv.textContent = '1K';
          animate4K(numberDiv);
          return;
        }

        // Numeric: "5,000+", "3,000+", "15+"
        var match = raw.match(/^([\d,]+)(\+?)$/);
        if (match) {
          var numStr = match[1].replace(/,/g, '');
          var target = parseInt(numStr, 10);
          var suffix = match[2] || '';
          // Use longer duration for small numbers so the animation is clearly visible
          var duration = target < 100 ? 2000 : 2200;
          numberDiv.textContent = '0' + suffix;
          animateCountUp(numberDiv, target, suffix, duration);
        }
      }

      function observeStats() {
        var statItems = document.querySelectorAll('[data-testid^="stat-item"]');
        if (statItems.length === 0) return false;

        var io = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              var idx = parseInt((entry.target.getAttribute('data-testid') || '').replace('stat-item-', ''), 10) || 0;
              // Stagger each card slightly
              (function (el, delay) {
                setTimeout(function () { initStatItem(el); }, delay);
              })(entry.target, idx * 120);
              io.unobserve(entry.target);
            }
          });
        }, { threshold: 0.3 });

        statItems.forEach(function (item) { io.observe(item); });
        return true;
      }

      var mo = new MutationObserver(function () {
        if (observeStats()) mo.disconnect();
      });

      function start() {
        if (!observeStats()) {
          mo.observe(document.body, { childList: true, subtree: true });
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', start);
      } else {
        start();
      }
    })();
  </script>
