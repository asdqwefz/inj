<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch Party Room | Watch4Gether</title>
  <link rel="icon" href="/inj/favicon.ico" />
  <link rel="stylesheet" href="/inj/_next/static/chunks/0b7ed925797e2d59.css" />
  <link rel="stylesheet" href="/inj/_next/static/chunks/f007294e78357151.css" />
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    .room-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px; background: #f5f5f5; border-radius: 8px; }
    .room-code { font-size: 24px; font-weight: bold; color: #0070f3; }
    .video-container { position: relative; padding-bottom: 56.25%; height: 0; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .url-input { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 10px; }
    .btn { padding: 12px 24px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; background: #0070f3; color: white; font-weight: 600; }
    .btn:hover { background: #0051cc; }
    .chat { border: 2px solid #ddd; border-radius: 8px; padding: 15px; height: 400px; overflow-y: auto; background: white; }
    .message { margin-bottom: 10px; padding: 8px; background: #f5f5f5; border-radius: 4px; }
  </style>
</head>
<body class="geist_mono_1bf8cbf6-module__FlyLvG__variable outfit_38930724-module__T9SkzW__variable font-sans antialiased">
  <div class="container">
    <div class="room-header">
      <div>
        <h1 style="margin: 0;">Watch Party Room</h1>
        <div class="room-code" id="roomCode">Loading...</div>
      </div>
      <button class="btn" onclick="copyRoomCode()">Copy Room Code</button>
    </div>

    <div>
      <input 
        type="text" 
        class="url-input" 
        id="videoUrl" 
        placeholder="Paste YouTube, Twitch, or Kick URL here..."
      />
      <button class="btn" onclick="loadVideo()">Load Video</button>
    </div>

    <div class="video-container" id="videoContainer">
      <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: white;">
        <p>Paste a video URL above to start watching</p>
      </div>
    </div>

    <div class="chat">
      <div id="messages">
        <div class="message">
          <strong>System:</strong> Welcome to the watch party! Share the room code with friends.
        </div>
      </div>
    </div>
  </div>

  <script>
    // Get room code from URL
    const pathParts = window.location.pathname.split('/');
    const roomCode = pathParts[pathParts.length - 1] || 'DEMO';
    document.getElementById('roomCode').textContent = `Room: ${roomCode}`;

    function copyRoomCode() {
      navigator.clipboard.writeText(roomCode);
      alert('Room code copied: ' + roomCode);
    }

    function getVideoId(url) {
      // YouTube
      let match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
      if (match) return { type: 'youtube', id: match[1] };
      
      // Twitch
      match = url.match(/twitch\.tv\/([^\/\s]+)/);
      if (match) return { type: 'twitch', id: match[1] };
      
      // Kick
      match = url.match(/kick\.com\/([^\/\s]+)/);
      if (match) return { type: 'kick', id: match[1] };
      
      return null;
    }

    function loadVideo() {
      const url = document.getElementById('videoUrl').value;
      const video = getVideoId(url);
      const container = document.getElementById('videoContainer');
      
      if (!video) {
        alert('Invalid URL. Please paste a YouTube, Twitch, or Kick URL.');
        return;
      }

      let embedHtml = '';
      
      if (video.type === 'youtube') {
        embedHtml = `<iframe src="https://www.youtube.com/embed/${video.id}?autoplay=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
      } else if (video.type === 'twitch') {
        embedHtml = `<iframe src="https://player.twitch.tv/?channel=${video.id}&parent=${window.location.hostname}" frameborder="0" allowfullscreen></iframe>`;
      } else if (video.type === 'kick') {
        embedHtml = `<iframe src="https://player.kick.com/${video.id}" frameborder="0" allowfullscreen></iframe>`;
      }
      
      container.innerHTML = embedHtml;
      
      // Add message
      const messages = document.getElementById('messages');
      messages.innerHTML += `<div class="message"><strong>System:</strong> Video loaded: ${video.type}</div>`;
      messages.scrollTop = messages.scrollHeight;
    }

    // Handle URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const videoUrl = urlParams.get('video');
    if (videoUrl) {
      document.getElementById('videoUrl').value = decodeURIComponent(videoUrl);
      loadVideo();
    }
  </script>
</body>
</html>
